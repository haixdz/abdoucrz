<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - لوحة التحكم</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: { primary: '#0ea5e9', dark: '#0f172a' }
                }
            }
        }
    </script>
</head>
<body class="bg-[#0f172a] text-gray-200 font-sans antialiased min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- مؤثرات خلفية -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-primary/20 rounded-full blur-3xl"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-600/20 rounded-full blur-3xl"></div>

    <div class="w-full max-w-md bg-[#1e293b] rounded-3xl shadow-2xl border border-gray-700 p-8 relative z-10">
        
        <div class="text-center mb-8">
            <a href="index.html" class="inline-block mb-6 hover:opacity-80 transition-opacity">
                <img src="https://i.ibb.co/kgq5vmvH/crz.webp" alt="abdoucrz logo" class="h-12 object-contain mx-auto brightness-0 invert">
            </a>
            <h1 class="text-2xl font-bold text-white mb-2">مرحباً بعودتك أيها المدير</h1>
            <p class="text-gray-400 text-sm">يرجى تسجيل الدخول للوصول إلى لوحة التحكم</p>
        </div>

        <!-- نظام الإشعارات المنبثقة -->
        <div id="error-msg" class="hidden bg-red-900/50 border border-red-500 text-red-200 px-4 py-3 rounded-xl text-sm font-bold mb-6 text-center">
            البريد الإلكتروني أو كلمة المرور غير صحيحة.
        </div>

        <form id="loginForm" class="flex flex-col gap-5">
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">البريد الإلكتروني</label>
                <div class="relative">
                    <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-gray-500">
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                    <input type="email" id="email" required placeholder="admin@example.com" class="w-full bg-[#0f172a] text-white border border-gray-600 rounded-xl pl-4 pr-10 py-3 focus:outline-none focus:border-primary transition-colors text-left" dir="ltr">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">كلمة المرور</label>
                <div class="relative">
                    <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-gray-500">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <input type="password" id="password" required placeholder="••••••••" class="w-full bg-[#0f172a] text-white border border-gray-600 rounded-xl pl-4 pr-10 py-3 focus:outline-none focus:border-primary transition-colors text-left" dir="ltr">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-primary hover:bg-blue-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-primary/30 transition-all mt-2 flex justify-center items-center gap-2">
                <span>دخول للوحة التحكم</span> <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="index.html" class="text-sm text-gray-500 hover:text-white transition-colors"><i class="fa-solid fa-house"></i> العودة للرئيسية</a>
        </div>
    </div>

    <!-- Firebase & Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBsCQ4Q1g1gzmwOx_9E3aE-eDncujAkK4A",
            authDomain: "abdoucrz-dd234.firebaseapp.com",
            projectId: "abdoucrz-dd234",
            storageBucket: "abdoucrz-dd234.firebasestorage.app",
            messagingSenderId: "305213328928",
            appId: "1:305213328928:web:47136d037fbe88002af645",
            measurementId: "G-8WF00TW430"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('error-msg');
            
            errorMsg.classList.add('hidden');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري التحقق...';
            submitBtn.disabled = true;

            try {
                // محاولة تسجيل الدخول
                await signInWithEmailAndPassword(auth, email, password);
                // عند النجاح، يتم التوجيه فوراً للوحة التحكم
                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error(error);
                errorMsg.classList.remove('hidden');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
